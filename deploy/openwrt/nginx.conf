# 可选：用 nginx 反代到 80/8080，避免直接暴露 3000 端口。
# OpenWrt 装包：opkg update && opkg install nginx
# 放到 /etc/nginx/conf.d/linai.conf（或按你的 nginx 版本 include 进 http{}）。
#
# 注意：GL.iNet / LuCI 默认占用 80 端口，这里用 8080，按需改 listen。

server {
    listen 8080;
    server_name _;

    # 参考图上传可能较大，放宽 body 限制
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
